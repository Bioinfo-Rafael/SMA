# =====================================================================
# curation_template.yaml -- HUMAN-EDITED settings for 05_curate_and_save_h5ad.py
#
# Fill `cell_type_column` / `cluster_column` ONLY AFTER reading the
# inspection reports produced by scripts/04_inspect_anndata_columns.py
# (data/reports/<dataset_id>_*). The pipeline never auto-decides these.
#
# Per-dataset keys
#   input_h5ad        : interim h5ad written by scripts/03
#   output_h5ad       : curated h5ad written by scripts/05
#   cell_type_column  : obs column to copy into obs['cell_type'] (null -> 'unknown')
#   cluster_column    : obs column to copy into obs['cluster_label'] (null -> skip)
#   keep_original_obs : keep every original obs column (recommended: true)
#   rename_obs_columns: {old: new} renames applied before anything else
#   add_constant_obs  : {col: value} constants added to every cell
#   condition_mapping : reserved for later; {enabled: false} for now
# =====================================================================

datasets:

  GSE287569_sc_spinalcord_sod1_ripk1i:
    input_h5ad: data/interim_h5ad/GSE287569_sc_spinalcord_sod1_ripk1i.h5ad
    output_h5ad: data/curated_h5ad/GSE287569_sc_spinalcord_sod1_ripk1i.curated.h5ad
    cell_type_column: null
    cluster_column: null
    keep_original_obs: true
    rename_obs_columns: {}
    add_constant_obs:
      species: Mus musculus
      disease_area: ALS
    condition_mapping:
      enabled: false

