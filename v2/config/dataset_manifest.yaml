    processing_status: raw
    output_h5ad: GSE219201_sn_lumbar_spinalcord_sod1_phd1.h5ad
    files:
      - name: GSE219201_RAW.tar
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE219nnn/GSE219201/suppl/GSE219201_RAW.tar
        kind: tar
        archive: true
    constants:
      organism: Mus musculus
      tissue: lumbar spinal cord
      region: lumbar spinal cord
      assay: snRNA-seq
      technology: 10x 3' single-cell gene expression
      enrichment: nuclei
      disease_area: ALS
      disease_model: SOD1G93A
      genotype: SOD1G93A
