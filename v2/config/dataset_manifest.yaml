# =====================================================================
# dataset_manifest.yaml  --  SOURCE OF TRUTH for download + organisation.
#
# In the notebook-centric v2, the .py scripts only USE this file to:
#   * validate it            (scripts/00_validate_manifest.py)
#   * download files         (scripts/01_download_geo_supplement.py)
#   * extract archives       (scripts/02_extract_archives.py)
#   * list downloaded files  (scripts/03_list_downloaded_files.py)
#
# AnnData loading / inspection / curation / merge happens in the Jupyter
# notebooks under notebooks/. They read this manifest too (loader_hint,
# metadata) but the human decides cell-type / cluster / condition columns.
#
# Field reference
#   dataset_id        : unique id; the curated/interim h5ad stem
#   source_accession  : the (Sub)Series the files actually live under
#   parent_gse        : the GEO accession the user browses
#   loader_hint       : which notebook loader helper to use
#   data_status       : raw_or_filtered_count | processed_TPM |
#                       processed_SoupX_corrected | RDS_converted_unknown_or_counts
#   file_type         : free text description
#   files[]           : {name, url, archive}  (archive=true -> step 02 unpacks)
#   do_not_use[]      : files / SubSeries deliberately excluded
#   output            : target curated h5ad file name
#   metadata{}        : reference constants for notebook curation (NOT auto
#                       applied by the scripts). Unknown/varying fields are
#                       intentionally omitted and set to 'unknown' in notebook 03.
#   notes             : human notes
# =====================================================================

defaults:
  species: Mus musculus
  data_status: raw_or_filtered_count

datasets:

  # -------------------------------------------------------------------
  - dataset_id: GSE287569_sc_spinalcord_sod1_ripk1i
    source_accession: GSE287569
    parent_gse: GSE287569
    loader_hint: 10x_h5_per_sample
    file_type: TAR of H5
    data_status: raw_or_filtered_count
    output: GSE287569_sc_spinalcord_sod1_ripk1i.h5ad
    files:
      - name: GSE287569_RAW.tar
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE287nnn/GSE287569/suppl/GSE287569_RAW.tar
        archive: true
    metadata:
      species: Mus musculus
      tissue: spinal cord
      region: spinal cord
      assay: scRNA-seq
      technology: 10x H5
      enrichment: whole spinal cord-derived preparation
      disease_area: ALS
      disease_model: SOD1G93A
    notes: >
      12 samples: d120_WT_* (control), d120_SOD1_veh_* (vehicle),
      d120_SOD1_RIPK1i_* (RIPK1i). Set genotype/treatment in notebook 03.

  # -------------------------------------------------------------------
  - dataset_id: GSE173524_sn_lumbar_spinalcord_sod1
    source_accession: GSE173524
    parent_gse: GSE173524
    loader_hint: combined_umi_tsv_with_metadata
    file_type: combined UMI tsv + nuclei/sample metadata tsv
    data_status: raw_or_filtered_count
    output: GSE173524_sn_lumbar_spinalcord_sod1.h5ad
    matrix_file: GSE173524_umi.tsv.gz
    metadata_files:
      - {name: GSE173524_metadata.nuclei.tsv.gz, role: per_cell}
      - {name: GSE173524_metadata.samples.tsv.gz, role: per_sample}
    files:
      - name: GSE173524_umi.tsv.gz
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE173nnn/GSE173524/suppl/GSE173524_umi.tsv.gz
        archive: false
      - name: GSE173524_metadata.nuclei.tsv.gz
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE173nnn/GSE173524/suppl/GSE173524_metadata.nuclei.tsv.gz
        archive: false
      - name: GSE173524_metadata.samples.tsv.gz
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE173nnn/GSE173524/suppl/GSE173524_metadata.samples.tsv.gz
        archive: false
      - name: GSE173524_readme.txt
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE173nnn/GSE173524/suppl/GSE173524_readme.txt
        archive: false
    do_not_use:
      - GSE173524_umi.sctransform.tsv.gz   # normalised; use raw umi.tsv.gz
    metadata:
      species: Mus musculus
      tissue: lumbar spinal cord
      region: lumbar spinal cord
      assay: snRNA-seq
      technology: 10x + hashtag oligos (combined UMI table)
      enrichment: nuclei
      disease_area: ALS
      disease_model: SOD1G93A
    notes: Condition columns live in the nuclei/sample metadata; join in notebook.

  # -------------------------------------------------------------------
  # GSE167332 SuperSeries -> 3 separate logical datasets (do NOT merge)
  # -------------------------------------------------------------------
  - dataset_id: GSE167198_sc_spinalcord_sod1_dropseq
    source_accession: GSE167198
    parent_gse: GSE167332
    loader_hint: dense_or_text_matrix_bundle
    file_type: TAR of TXT
    data_status: raw_or_filtered_count
    output: GSE167198_sc_spinalcord_sod1_dropseq.h5ad
    files:
      - name: GSE167198_RAW.tar
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE167nnn/GSE167198/suppl/GSE167198_RAW.tar
        archive: true
    metadata:
      species: Mus musculus
      tissue: spinal cord
      region: spinal cord
      assay: scRNA-seq
      technology: Drop-seq
      enrichment: whole spinal cord-derived cell suspension
      disease_area: ALS
      disease_model: SOD1G93A
    notes: Samples WT-Veh / SOD1-Veh / SOD1-Nec. Set condition in notebook 03.

  # -------------------------------------------------------------------
  - dataset_id: GSE167327_sc_spinalcord_optn_cd45_enriched_indrop
    source_accession: GSE167327
    parent_gse: GSE167332
    loader_hint: mtx_or_text_bundle
    file_type: TAR of MTX/TXT plus side TXT
    data_status: raw_or_filtered_count
    output: GSE167327_sc_spinalcord_optn_cd45_enriched_indrop.h5ad
    side_table: GSE167327.txt.gz
    files:
      - name: GSE167327_RAW.tar
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE167nnn/GSE167327/suppl/GSE167327_RAW.tar
        archive: true
      - name: GSE167327.txt.gz
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE167nnn/GSE167327/suppl/GSE167327.txt.gz
        archive: false
    metadata:
      species: Mus musculus
      tissue: spinal cord
      region: spinal cord
      assay: scRNA-seq
      technology: inDrop
      enrichment: CD45 enriched cells
      disease_area: ALS
      disease_model: Optn floxed/KO
    notes: CD45 enriched -> keep separate from whole spinal cord datasets.

  # -------------------------------------------------------------------
  - dataset_id: GSE167331_sc_spinalcord_optn_facs_microglia_smartseq2_tpm
    source_accession: GSE167331
    parent_gse: GSE167332
    loader_hint: dense_gene_by_cell_matrix
    file_type: TPM matrix (RSEM genes x cells)
    data_status: processed_TPM     # NOT raw UMI counts
    output: GSE167331_sc_spinalcord_optn_facs_microglia_smartseq2_tpm.h5ad
    matrix_file: GSE167331_nextseq_180111_rsem.genes.tpm.matrix.gz
    files:
      - name: GSE167331_nextseq_180111_rsem.genes.tpm.matrix.gz
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE167nnn/GSE167331/suppl/GSE167331_nextseq_180111_rsem.genes.tpm.matrix.gz
        archive: false
    metadata:
      species: Mus musculus
      tissue: spinal cord
      region: spinal cord
      assay: scRNA-seq
      technology: SmartSeq2
      enrichment: FACS-isolated microglia (CD11b+ CX3CR1+ CD45-int)
      disease_area: ALS
      disease_model: Optn KO
    notes: TPM matrix -> data_status processed_TPM; never pool with raw counts.

  # -------------------------------------------------------------------
  - dataset_id: GSE219201_sn_lumbar_spinalcord_sod1_phd1
    source_accession: GSE219201
    parent_gse: GSE219201
    loader_hint: 10x_mtx_per_sample
    file_type: TAR of MTX/TSV
    data_status: raw_or_filtered_count
    output: GSE219201_sn_lumbar_spinalcord_sod1_phd1.h5ad
    files:
      - name: GSE219201_RAW.tar
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE219nnn/GSE219201/suppl/GSE219201_RAW.tar
        archive: true
    metadata:
      species: Mus musculus
      tissue: lumbar spinal cord
      region: lumbar spinal cord
      assay: snRNA-seq
      technology: 10x 3' single-cell gene expression
      enrichment: nuclei
      disease_area: ALS
      disease_model: SOD1G93A
    notes: SOD1G93A PHD1+/+ vs PHD1-/-; set phd1_status in notebook 03.

  # -------------------------------------------------------------------
  # GSE242942 SuperSeries: use ONLY the scRNA-seq SubSeries GSE242939.
  - dataset_id: GSE242939_sc_spinalcord_sod1_pf04457845
    source_accession: GSE242939
    parent_gse: GSE242942
    loader_hint: 10x_mtx_per_sample
    file_type: TAR of MTX/TSV
    data_status: raw_or_filtered_count
    output: GSE242939_sc_spinalcord_sod1_pf04457845.h5ad
    files:
