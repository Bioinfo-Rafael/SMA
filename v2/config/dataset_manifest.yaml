    loader: mtx_or_text_bundle
    data_status: raw_counts
    processing_status: raw
    output_h5ad: GSE167327_sc_spinalcord_optn_cd45_enriched_indrop.h5ad
    files:
      - name: GSE167327_RAW.tar
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE167nnn/GSE167327/suppl/GSE167327_RAW.tar
        kind: tar
        archive: true
      - name: GSE167327.txt.gz
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE167nnn/GSE167327/suppl/GSE167327.txt.gz
        kind: gz
        archive: false
    # small side table: report its content, do not assume it is a matrix
    side_table: GSE167327.txt.gz
    constants:
      organism: Mus musculus
      tissue: spinal cord
      region: spinal cord
      assay: scRNA-seq
      technology: inDrop
      enrichment: CD45 enriched cells
      disease_area: ALS
      disease_model: Optn floxed/KO
      genotype: unknown
      disease_status: unknown
      treatment: unknown
    sample_rules:
      - match: '(?i)(flox|fl[_.\-]?fl|ctrl|control|(^|[_.\-])wt([_.\-]|$))'
        set: {optn_status: floxed}
      - match: '(?i)((^|[_.\-])ko([_.\-]|$)|optn.*ko)'
        set: {optn_status: KO}

