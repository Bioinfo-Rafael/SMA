  # -------------------------------------------------------------------
  - dataset_id: GSE295514_sc_brain_rnls8_tdp43_rds
    source_accession: GSE295514
    parent_gse: GSE295514
    loader_hint: R_jupyter_kernel_manual
    file_type: RDS (Seurat or SingleCellExperiment)
    data_status: RDS_converted_unknown_or_counts
    output: GSE295514_sc_brain_rnls8_tdp43_rds.h5ad
    rds_file: GSE295514_ALS_mouse_brain.rds
    intermediate_from_r: GSE295514     # data/intermediate_from_r/GSE295514/
    files:
      - name: GSE295514_ALS_mouse_brain.rds
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE295nnn/GSE295514/suppl/GSE295514_ALS_mouse_brain.rds
        archive: false
    metadata:
      species: Mus musculus
      tissue: brain
      region: brain
      assay: scRNA-seq
      technology: 10x (RDS object provided)
      disease_area: ALS
      disease_model: rNLS8 (TDP-43)
    notes: >
      Open in the R Jupyter kernel (notebooks/R/01_GSE295514_read_rds.ipynb),
      inspect class/assays/meta.data, then export counts.mtx + metadata.csv +
      genes.csv + barcodes.csv to data/intermediate_from_r/GSE295514/. The
      Python notebook reads those.

  # -------------------------------------------------------------------
