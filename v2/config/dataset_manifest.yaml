    constants:
      organism: Mus musculus
      tissue: spinal cord
      region: spinal cord
      assay: scRNA-seq
      technology: SmartSeq2
      enrichment: FACS-isolated microglia (CD11b+ CX3CR1+ CD45-int)
      disease_area: ALS
      disease_model: Optn KO
      genotype: OptnKO
      disease_status: unknown
      treatment: unknown
    sample_rules: []

  # -------------------------------------------------------------------
  - dataset_id: GSE219201_sn_lumbar_spinalcord_sod1_phd1
