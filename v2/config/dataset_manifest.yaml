        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE242nnn/GSE242939/suppl/GSE242939_RAW.tar
        archive: true
    do_not_use:
      - GSE242940   # bulk RNA-seq SubSeries
    metadata:
      species: Mus musculus
      tissue: spinal cord
      region: spinal cord
      assay: scRNA-seq
      technology: 10x MTX/TSV
      disease_area: ALS
      disease_model: SOD1G93A
    notes: Vehicle vs PF-04457845; set treatment in notebook 03.

  # -------------------------------------------------------------------
  - dataset_id: GSE206330_sc_cortex_sod1_facs_glia_soupx
    source_accession: GSE206330
    parent_gse: GSE206330
    loader_hint: processed_count_matrix_with_metadata
    file_type: processed TXT + metadata CSV
    data_status: processed_SoupX_corrected   # NOT raw Cell Ranger
    output: GSE206330_sc_cortex_sod1_facs_glia_soupx.h5ad
    matrix_file: GSE206330_processed_SoupX_corrected.txt.gz
    metadata_files:
      - {name: GSE206330_processed_SoupX_corrected_metadata.csv.gz, role: per_cell}
    files:
      - name: GSE206330_processed_SoupX_corrected.txt.gz
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE206nnn/GSE206330/suppl/GSE206330_processed_SoupX_corrected.txt.gz
        archive: false
      - name: GSE206330_processed_SoupX_corrected_metadata.csv.gz
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE206nnn/GSE206330/suppl/GSE206330_processed_SoupX_corrected_metadata.csv.gz
        archive: false
      - name: GSE206330_preprocessed_data.txt.gz
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE206nnn/GSE206330/suppl/GSE206330_preprocessed_data.txt.gz
        archive: false
