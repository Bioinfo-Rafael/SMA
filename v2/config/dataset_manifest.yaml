# =====================================================================
# dataset_manifest.yaml  --  SOURCE OF TRUTH for the ALS/SMA scRNA-seq
# preprocessing pipeline.
#
# This file is hand-authored from the project specification. The pipeline
# scripts MUST treat this file as authoritative and MUST NOT scrape GEO
# pages to (re)discover SubSeries, file names or URLs.
#
# Each entry under `datasets:` is ONE logical dataset -> ONE interim h5ad.
# SuperSeries that mix incompatible material (e.g. GSE167332) are split
# into several logical datasets here on purpose.
#
# Field reference
#   dataset_id          : unique id, also the report / file stem
#   parent_gse          : the GEO accession the user browses
#   source_accession    : the (Sub)Series the files actually live under
#   loader              : dispatch key in scripts/03_load_to_anndata.py
#   data_status         : raw_counts | processed_TPM |
#                         processed_SoupX_corrected | unknown_text_matrix
#   processing_status   : free text, mirrored into obs + uns
#   files[]             : {name, url, kind, archive}
#                         kind in {tar, gz, plain, rds, csv}
#                         archive=true  -> 02_extract_archives.py unpacks it
#   metadata_files[]    : auxiliary tables joined onto obs at load time
#   constants{}         : obs columns broadcast to every cell of the dataset
#   sample_rules[]      : {match: <regex>, set: {obs: value}} applied per
#                         sample using the sample label / file name. Multiple
#                         matches are merged (later rule wins on a key).
#   condition_from_metadata : if true, do NOT parse condition from file names;
#                             keep the merged metadata and let a human fill the
#                             curation yaml after reading the inspection report.
#
# NOTE: condition / genotype / treatment that are NOT knowable from the file
# name are intentionally left as `unknown` here. The inspection reports
# (scripts/04) expose every column so a human can finalise them in
# config/curation_template.yaml. Cell-type / cluster columns are NEVER
# auto-decided by this pipeline.
# =====================================================================

defaults:
  organism: Mus musculus
  data_status: raw_counts
  processing_status: raw

datasets:

  # -------------------------------------------------------------------
  - dataset_id: GSE287569_sc_spinalcord_sod1_ripk1i
    parent_gse: GSE287569
    source_accession: GSE287569
    title: Single cell RNAseq of SOD1 mouse spinal cords
    loader: 10x_h5_per_sample
    data_status: raw_counts
    processing_status: raw
    sample_count_expected: 12
    output_h5ad: GSE287569_sc_spinalcord_sod1_ripk1i.h5ad
    files:
      - name: GSE287569_RAW.tar
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE287nnn/GSE287569/suppl/GSE287569_RAW.tar
        kind: tar
        archive: true
    constants:
      organism: Mus musculus
      tissue: spinal cord
      region: spinal cord
      assay: scRNA-seq
      technology: 10x H5
      enrichment: whole spinal cord-derived preparation
      disease_area: ALS
      disease_model: SOD1G93A
      genotype: unknown
      disease_status: unknown
      treatment: unknown
    sample_rules:
      - match: '(?i)(^|[_.\-])wt([_.\-]|$)'
        set: {genotype: WT, disease_status: control, treatment: none}
      - match: '(?i)sod1.*veh'
        set: {genotype: SOD1G93A, disease_status: ALS_model, treatment: vehicle}
      - match: '(?i)sod1.*ripk1i'
        set: {genotype: SOD1G93A, disease_status: ALS_model, treatment: RIPK1i}
      - match: '(?i)sod1'
        set: {genotype: SOD1G93A, disease_status: ALS_model}

  # -------------------------------------------------------------------
  - dataset_id: GSE173524_sn_lumbar_spinalcord_sod1
    parent_gse: GSE173524
    source_accession: GSE173524
    title: Neuronal-Glial Communication Perturbations in Murine SOD1G93A Spinal Cord
    loader: combined_umi_tsv_with_metadata
    data_status: raw_counts
    processing_status: raw
    condition_from_metadata: true
    output_h5ad: GSE173524_sn_lumbar_spinalcord_sod1.h5ad
    files:
      - name: GSE173524_umi.tsv.gz
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE173nnn/GSE173524/suppl/GSE173524_umi.tsv.gz
        kind: gz
        archive: false
      - name: GSE173524_metadata.nuclei.tsv.gz
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE173nnn/GSE173524/suppl/GSE173524_metadata.nuclei.tsv.gz
        kind: gz
        archive: false
      - name: GSE173524_metadata.samples.tsv.gz
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE173nnn/GSE173524/suppl/GSE173524_metadata.samples.tsv.gz
        kind: gz
        archive: false
      - name: GSE173524_readme.txt
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE173nnn/GSE173524/suppl/GSE173524_readme.txt
        kind: plain
        archive: false
    # GSE173524_umi.sctransform.tsv.gz is deliberately NOT listed: it is the
    # normalised version. Raw-UMI integration must use GSE173524_umi.tsv.gz.
    do_not_use:
      - GSE173524_umi.sctransform.tsv.gz
    matrix_file: GSE173524_umi.tsv.gz
    metadata_files:
      - {name: GSE173524_metadata.nuclei.tsv.gz, role: per_cell}
      - {name: GSE173524_metadata.samples.tsv.gz, role: per_sample}
    constants:
      organism: Mus musculus
      tissue: lumbar spinal cord
      region: lumbar spinal cord
      assay: snRNA-seq
      technology: 10x + hashtag oligos (combined UMI table)
      enrichment: nuclei
      disease_area: ALS
      disease_model: SOD1G93A
      genotype: unknown
      disease_status: unknown
      treatment: unknown
    sample_rules: []

  # -------------------------------------------------------------------
  # GSE167332 SuperSeries -> 3 separate logical datasets (do NOT merge)
  # -------------------------------------------------------------------
  - dataset_id: GSE167198_sc_spinalcord_sod1_dropseq
    parent_gse: GSE167332
    source_accession: GSE167198
    title: scRNAseq from spinal cords of SOD1-G93A and WT mice
    loader: dense_or_text_matrix_bundle
    data_status: raw_counts
    processing_status: raw
    output_h5ad: GSE167198_sc_spinalcord_sod1_dropseq.h5ad
    files:
      - name: GSE167198_RAW.tar
        url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE167nnn/GSE167198/suppl/GSE167198_RAW.tar
        kind: tar
        archive: true
    constants:
      organism: Mus musculus
      tissue: spinal cord
      region: spinal cord
      assay: scRNA-seq
      technology: Drop-seq
      enrichment: whole spinal cord-derived cell suspension
      disease_area: ALS
      disease_model: SOD1G93A
      genotype: unknown
      disease_status: unknown
      treatment: unknown
    sample_rules:
      - match: '(?i)wt.*veh'
        set: {genotype: WT, disease_status: control, treatment: vehicle}
      - match: '(?i)sod1.*veh'
        set: {genotype: SOD1G93A, disease_status: ALS_model, treatment: vehicle}
      - match: '(?i)sod1.*nec'
        set: {genotype: SOD1G93A, disease_status: ALS_model, treatment: Nec-1s_RIPK1i}
      - match: '(?i)(^|[_.\-])wt([_.\-]|$)'
        set: {genotype: WT, disease_status: control}
      - match: '(?i)sod1'
        set: {genotype: SOD1G93A, disease_status: ALS_model}

