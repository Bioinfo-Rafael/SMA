      tissue: spinal cord
      region: spinal cord
      assay: scRNA-seq
      technology: 10x MTX/TSV
      disease_area: SMA
      disease_model: SMA Taiwanese type I
    notes: SMA vs Con; set disease_status in notebook 03.
