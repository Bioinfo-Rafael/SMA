      - GSE242940   # bulk RNA-seq SubSeries
    constants:
      organism: Mus musculus
      tissue: spinal cord
      region: spinal cord
      assay: scRNA-seq
      technology: 10x MTX/TSV
      enrichment: not specified
      disease_area: ALS
